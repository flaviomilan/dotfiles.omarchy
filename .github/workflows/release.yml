name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          token: ${{ secrets.GITHUB_TOKEN }}
          default-branch: main

      - name: Enable auto-merge on release PR
        if: ${{ steps.release.outputs.pr }}
        run: gh pr merge --auto --squash "${{ steps.release.outputs.pr }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
